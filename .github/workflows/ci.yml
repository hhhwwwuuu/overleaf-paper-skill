name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate project structure
        run: python scripts/validate_project.py
      - name: Check shared JSS script entrypoint
        run: python skills/overleaf-paper/scripts/jss_latex_check.py --help